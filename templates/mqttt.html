{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
    <article class="md-card auth-card">
        <h1 class="md-title">MQTT Message</h1>
        <form method="post" action="{{ url_for('routes.index') }}" class="auth-form">
            <div class="md-field">
                <label class="md-label" for="mqtt-command">Command</label>
                <input id="mqtt-command" type="text" class="md-input" name="command">
            </div>
            <button class="md-button" type="submit">Send</button>
        </form>
    </article>
</section>
{% endblock %}
