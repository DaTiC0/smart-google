{% extends "base.html" %}

{% block content %}
<section class="page-wrap">
    <article class="card">
        <h1>Login</h1>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="card-alert" role="alert">
            {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="md-field">
                <label class="md-label" for="login-email">Email</label>
                <input id="login-email" class="md-input" type="email" name="email" placeholder="Your Email" autofocus="">
            </div>

            <div class="md-field">
                <label class="md-label" for="login-password">Password</label>
                <input id="login-password" class="md-input" type="password" name="password" placeholder="Your Password">
            </div>

            <div class="md-checkbox-row">
                <label class="md-checkbox-label">
                    <input type="checkbox" name="remember">
                    Remember me
                </label>
            </div>

            <button class="md-button" type="submit">Login</button>
        </form>
    </article>
</section>
{% endblock %}
