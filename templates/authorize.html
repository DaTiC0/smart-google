{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
  <article class="auth-card" style="text-align: center;">
    <div style="margin-bottom: 2rem;">
        <div style="width: 80px; height: 80px; background: rgba(139, 92, 246, 0.1); color: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem;">
            <svg style="width: 40px; height: 40px;"><use xlink:href="#icon-shield"></use></svg>
        </div>
        <h1 style="margin-bottom: 0.5rem;">Third-Party Access</h1>
        <p style="color: var(--text-secondary);">An application is requesting access to your Smart Home.</p>
    </div>

    <div style="background: var(--bg-widget); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; text-align: left; border: 1px solid var(--border);">
        <div style="display: grid; gap: 1rem;">
            <div>
                <span class="md-label" style="font-size: 0.7rem;">Requesting Client</span>
                <p style="font-weight: 700; margin-top: 0.25rem; color: var(--accent);">{{ client.client_id }}</p>
            </div>
            <div>
                <span class="md-label" style="font-size: 0.7rem;">Authenticated User</span>
                <p style="font-weight: 700; margin-top: 0.25rem;">{{ user.username }}</p>
            </div>
        </div>
    </div>

    <form action="{{ url_for('routes.authorize') }}" method="post" class="auth-form">
      <p style="font-weight: 700; margin-bottom: 1.5rem; color: var(--text-primary);">Allow this application to control your devices?</p>
      
      <input type="hidden" name="client_id" value="{{ client.client_id }}">
      <input type="hidden" name="scope" value="{{ scopes|join(' ') }}">
      <input type="hidden" name="response_type" value="{{ response_type }}">
      {% if state %}
      <input type="hidden" name="state" value="{{ state }}">
      {% endif %}

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <button class="md-button" type="submit" name="confirm" value="yes">Authorize Access</button>
        <button class="md-button" type="submit" name="confirm" value="no" style="background: var(--bg-widget); color: var(--text-secondary);">Deny</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
