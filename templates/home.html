{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
  <article class="md-card auth-card">
    <h1 class="md-title">Login</h1>
    {% if user %}
    <p class="md-meta">You are {{ user.username }}</p>
    {% else %}
    <p class="md-meta">You are not authenticated</p>
    {% endif %}

    <form method="post" action="{{ url_for('routes.index') }}" class="auth-form">
      <div class="md-field">
        <label class="md-label" for="home-username">Type any username</label>
        <input id="home-username" type="text" class="md-input" name="username">
      </div>
      <button class="md-button" type="submit">Submit</button>
    </form>
  </article>
</section>
{% endblock %}
