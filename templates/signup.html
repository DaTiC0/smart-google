{% extends "base.html" %}

{% block content %}
<section class="page-wrap" style="max-width: 480px;">
    <article class="card">
        <h1 style="text-align: center;">Sign Up</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="card-alert" role="alert">
                {{ messages[0] }}. Go to <a href="{{ url_for('auth.login') }}" style="font-weight: 700;">login page</a>.
            </div>
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form">
            <div class="md-field">
                <label class="md-label" for="signup-email">Email</label>
                <input id="signup-email" class="md-input" type="email" name="email" placeholder="Your Email" autofocus required>
            </div>

            <div class="md-field">
                <label class="md-label" for="signup-name">Name</label>
                <input id="signup-name" class="md-input" type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="md-field">
                <label class="md-label" for="signup-password">Password</label>
                <input id="signup-password" class="md-input" type="password" name="password" placeholder="Create a Password" required>
            </div>

            <button class="md-button" type="submit">Create Account</button>
        </form>
    </article>
</section>
{% endblock %}
