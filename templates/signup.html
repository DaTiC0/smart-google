{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
    <article class="auth-card">
        <h1 class="text-center u-margin-bottom-2">Create Account</h1>
        
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="card-alert card-alert--success" role="alert">
                {{ messages[0] }}. <a href="{{ url_for('auth.login') }}" class="accent-text" style="text-decoration: underline;">Login now</a>.
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form">
            <div class="md-field">
                <label class="md-label" for="signup-name">Full Name</label>
                <input id="signup-name" class="md-input" type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="md-field">
                <label class="md-label" for="signup-email">Email Address</label>
                <input id="signup-email" class="md-input" type="email" name="email" placeholder="name@example.com" required autofocus>
            </div>

            <div class="md-field">
                <label class="md-label" for="signup-password">Password</label>
                <input id="signup-password" class="md-input" type="password" name="password" placeholder="Create a strong password" required>
            </div>

            <button class="md-button u-margin-top-1" type="submit">Create My Account</button>
            
            <div class="text-center u-margin-top-1">
                <a href="{{ url_for('auth.login') }}" class="u-opacity-6">Already have an account? <span class="accent-text">Login</span></a>
            </div>
        </form>
    </article>
</section>
{% endblock %}
